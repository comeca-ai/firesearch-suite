services:
  firecrawl:
    image: node:20-bullseye
    container_name: firecrawl
    environment:
      - NODE_ENV=production
      - FIRECRAWL_API_KEY=fc-local-key
      - PORT=8001
    networks:
      - internal
    command: >
      sh -c "
      echo 'Starting mock Firecrawl service...';
      mkdir -p /app;
      echo 'const http = require(\"http\");
      const server = http.createServer((req, res) => {
        if (req.url === \"/health\" || req.url === \"/api/health\" || req.url === \"/\") {
          res.writeHead(200, {\"Content-Type\": \"application/json\"});
          res.end(JSON.stringify({status: \"healthy\", service: \"firecrawl-mock\", port: 8001}));
        } else {
          res.writeHead(404);
          res.end(\"Not found\");
        }
      });
      server.listen(8001, \"0.0.0.0\", () => console.log(\"Mock Firecrawl running on port 8001\"));' > /app/server.js;
      node /app/server.js
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  claude-code-api:
    image: node:20-bullseye
    container_name: claude-code-api
    environment:
      - CLAUDE_API_KEY=sk-ant-local-key
      - PORT=8000
    depends_on:
      firecrawl:
        condition: service_healthy
    networks:
      - internal
    command: >
      sh -c "
      echo 'Starting mock Claude Code API service...';
      mkdir -p /app;
      echo 'const http = require(\"http\");
      const server = http.createServer((req, res) => {
        if (req.url === \"/health\" || req.url === \"/api/health\" || req.url === \"/\") {
          res.writeHead(200, {\"Content-Type\": \"application/json\"});
          res.end(JSON.stringify({status: \"healthy\", service: \"claude-code-api-mock\", port: 8000}));
        } else {
          res.writeHead(404);
          res.end(\"Not found\");
        }
      });
      server.listen(8000, \"0.0.0.0\", () => console.log(\"Mock Claude Code API running on port 8000\"));' > /app/server.js;
      node /app/server.js
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  firesearch:
    build:
      context: ./firesearch
      dockerfile: Dockerfile
    container_name: firesearch
    environment:
      - FIRECRAWL_API_URL=http://firecrawl:8001
      - CLAUDE_API_URL=http://claude-code-api:8000
      - FIRECRAWL_API_KEY=fc-local-key
      - CLAUDE_API_KEY=sk-ant-local-key
      - NODE_ENV=production
      - PORT=3000
      - DISABLE_EXTERNAL_APIs=true
    ports:
      - "3000:3000"
    depends_on:
      firecrawl:
        condition: service_healthy
      claude-code-api:
        condition: service_healthy
    networks:
      - internal
    command: ["/app/init_all.sh"]

networks:
  internal:
    driver: bridge