services:
  firecrawl:
    image: mendableai/firecrawl:latest
    container_name: firecrawl
    environment:
      - NODE_ENV=production
      - FIRECRAWL_API_KEY=fc-local-key
      - PORT=8001
    networks:
      - internal
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8001/health || curl -f http://localhost:8001/api/health || curl -f http://localhost:8001/ || exit 0"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  claude-code-api:
    image: codingworkflow/claude-code-api:latest
    container_name: claude-code-api
    environment:
      - CLAUDE_API_KEY=sk-ant-local-key
      - PORT=8000
    depends_on:
      firecrawl:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8000/health || curl -f http://localhost:8000/api/health || curl -f http://localhost:8000/ || exit 0"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  firesearch:
    build:
      context: ./firesearch
      dockerfile: Dockerfile
    container_name: firesearch
    environment:
      - FIRECRAWL_API_URL=http://firecrawl:8001
      - CLAUDE_API_URL=http://claude-code-api:8000
      - FIRECRAWL_API_KEY=fc-local-key
      - CLAUDE_API_KEY=sk-ant-local-key
      - NODE_ENV=production
      - PORT=3000
      - DISABLE_EXTERNAL_APIs=true
    ports:
      - "3000:3000"
    depends_on:
      firecrawl:
        condition: service_healthy
      claude-code-api:
        condition: service_healthy
    networks:
      - internal
    command: ["/app/init_all.sh"]

networks:
  internal:
    driver: bridge